<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./favicon/favicon-16x16.png" type="image/png">
    <title>Pokédex</title>
    <style>

        @font-face {
            font-family: poke-sans;
            src: url("font/PokemonSolidNormal-xyWR.ttf");
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: poke-sans;
            letter-spacing: 2.75px;

        }
        body {
            font-family: poke-sans, sans-serif;
            text-align: center;
            background: radial-gradient(circle at top, #e94c4c, #c43c3c, #7a1f1f);
            min-height: 100vh;
}
        #title {
            color: #3ccdf1;
            text-shadow: 2px 1px 1px #333;
        }
        .pokedex {
            margin: 40px auto 0 auto;
            width: 350px;
            border-radius: 30px;
            padding: 30px 20px 20px 20px;
            background: #b7d5ac;
            box-shadow: 6px 8px 2px #333;
            border: 6px solid #b71c1c;
            position: relative;
        }
        #search-input {
            margin: 5px;
            padding: 5px;
            width: 20%;
        }
        button, prev-btn, next-btn,input {
            background: #e4f2f7;
            padding: 10px;
            margin: 10px;
            width: 150px;
            border-radius: 10px;
            border: solid 1.5px #333;
        }
        #pokemon-name, #pokemon-type {
            text-transform: capitalize;
            padding-bottom: 10px;
        }
        .pokemon-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .pokemon-info img {
            width: 150px;
            height: 150px;
        }
        .pokemon-info h2,
        .pokemon-info p {
            margin: 5px 0;
        }
    </style>
</head>

<body>
    <h1 id="title">Pokédex</h1>
    <form class="buscar" id="search-form">
        <div>
            <input type="search" id="search-input" placeholder="Nome ou número do Pokémon" required>
            <button id="search-btn" type="submit">Buscar</button>
        </div>
    </form>
    <div class="pokedex">
        <div class="screen pokemon-info">
            <img id="pokemon-image" src="" alt="Imagem do Pokémon">
            <h2><span id="pokemon-name">Nome</span> <span id="pokemon-id"></span></h2>
            <p id="pokemon-type">Tipo</p>
            <p id="pokemon-height">Altura</p>
            <p id="pokemon-weight">Peso</p>
            <p id="error-message"></p>
        </div>
        <div class="controls">
            <button id="prev-btn" type="button">Anterior</button>
            <button id="next-btn" type="button">Próximo</button>
        </div>
    </div>

    <script>
        // API de pokemon 
        var apiUrl = 'https://pokeapi.co/api/v2/pokemon/';
        // começa pelo Pokemon de id 1
        var currentPokemonId = 1;

        // pega o id de elementos do HTML
        var searchInput = document.getElementById('search-input'); 
        var searchForm = document.getElementById('search-form');   
        var prevButton = document.getElementById('prev-btn');      
        var nextButton = document.getElementById('next-btn');      
        var pokemonImage = document.getElementById('pokemon-image'); 
        var pokemonName = document.getElementById('pokemon-name');   
        var pokemonId = document.getElementById('pokemon-id');   
        var pokemonType = document.getElementById('pokemon-type');   
        var pokemonHeight = document.getElementById('pokemon-height'); 
        var pokemonWeight = document.getElementById('pokemon-weight'); 
        var errorMessage = document.getElementById('error-message'); 

        // função para buscar pokemon por nome ou número
        function fetchPokemon(idOrName) {
            // cria a URL pra buscar o pokemon com base no id ou nome
            var url = apiUrl + idOrName;
            fetch(url)

                .then(function (response) {
                    if (!response.ok) {
                        errorMessage.textContent = "Pokémon não encontrado.";
                         pokemonImage.src = "";
                        pokemonName.textContent = "Nome";
                        pokemonId.textContent = "";
                        pokemonHeight.textContent = "Altura";
                        pokemonType.textContent = "Tipo";
                        pokemonWeight.textContent = "Peso";
                        return;

                    }
                    return response.json();
                })
                .then(function (data) {
                    if (data) {
                        displayPokemon(data);
                        currentPokemonId = data.id; 
                    }
                })
                .catch(function () {
                    errorMessage.textContent = "Erro ao buscar Pokémon.";
                });
        }

       
        function displayPokemon(data) {
            errorMessage.textContent = "";

            pokemonImage.src = data.sprites.versions["generation-v"]["black-white"].animated.front_default;
            pokemonImage.alt = "Imagem do Pokémon " + data.name;

            pokemonId.textContent = " -> nº " + data.id;
            pokemonName.textContent = data.name;

            pokemonType.textContent = "Tipo: " + data.types.map(function (type) {
             return type.type.name;
            }).join(', ');

            pokemonHeight.textContent = "Altura: " + (data.height / 10) + " m";
            pokemonWeight.textContent = "Peso: " + (data.weight / 10) + " kg";
        }

        // evento do formulário de busca (impede o recarregamento da página)
        searchForm.addEventListener('submit', function (event) {
            event.preventDefault(); 
            var value = searchInput.value.trim().toLowerCase(); 
            if (value) {
                fetchPokemon(value); 
            }
        });

        prevButton.addEventListener('click', function () {
            
            if (currentPokemonId > 1) {
                currentPokemonId--; 
                fetchPokemon(currentPokemonId);
            }
        });

        nextButton.addEventListener('click', function () {
            currentPokemonId++; 
            
            fetchPokemon(currentPokemonId);
        });

        fetchPokemon(currentPokemonId);
    </script>
</body>
</html>
